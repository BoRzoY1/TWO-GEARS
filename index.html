<!-- index.html - Главный терминал -->
<!DOCTYPE html>
<html lang="ru">
<head>
    <link rel="icon" type="image/png" href="favicon.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TWO GEARS</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=JetBrains+Mono:wght@400;700&family=VT323&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --amber: #FFB000;
            --amber-dim: #8B6914;
            --heat: #FF4500;
            --copper: #CD7F32;
            --dark: #050505;
        }

        html, body {
            background: var(--dark);
            color: var(--amber);
            font-family: 'VT323', monospace;
            height: 100%;
            width: 100%;
            overflow: hidden;
            position: fixed;
        }

        .scanlines {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to bottom, rgba(255,255,255,0) 50%, rgba(0,0,0,0.4) 50%);
            background-size: 100% 4px;
            pointer-events: none;
            z-index: 100;
        }

        .crt-flicker {
            animation: flicker 0.15s infinite;
            position: relative;
            width: 100%;
            height: 100%;
        }

        @keyframes flicker {
            0% { opacity: 0.97; }
            50% { opacity: 1; }
            100% { opacity: 0.98; }
        }

        .bezel {
            position: fixed;
            top: 10px; left: 10px; right: 10px; bottom: 10px;
            border: 15px solid #1a1a1a;
            border-radius: 20px;
            box-shadow: 
                inset 0 0 100px rgba(0,0,0,0.9),
                0 0 0 10px #0a0a0a,
                0 0 0 12px var(--copper),
                0 0 40px rgba(205, 127, 50, 0.4);
            pointer-events: none;
            z-index: 200;
        }

        .screen {
            position: absolute;
            top: 25px; left: 25px; right: 25px; bottom: 25px;
            overflow: hidden;
            z-index: 10;
        }

        /* Boot */
        .boot-screen {
            padding: 1rem;
            font-size: clamp(0.9rem, 3vw, 1.4rem);
            line-height: 1.5;
            height: 100%;
            overflow-y: auto;
        }

        .boot-line {
            opacity: 0;
            animation: typeIn 0.05s forwards;
            margin-bottom: 0.2rem;
            text-shadow: 0 0 5px var(--amber);
            word-break: break-word;
        }

        @keyframes typeIn { to { opacity: 1; } }

        .cursor {
            display: inline-block;
            width: 10px; height: 16px;
            background: var(--amber);
            animation: blink 0.8s infinite;
            vertical-align: middle;
            margin-left: 3px;
            box-shadow: 0 0 10px var(--amber);
        }

        @keyframes blink {
            0%, 50% { opacity: 1; }
            51%, 100% { opacity: 0; }
        }

        /* Main Menu */
        .main-menu {
            display: none;
            height: 100%;
            flex-direction: column;
            justify-content: flex-start;
            align-items: center;
            padding: 1rem;
            overflow-y: auto;
        }

        .glitch-title {
            font-family: 'Bebas Neue', sans-serif;
            font-size: clamp(2.5rem, 12vw, 7rem);
            color: var(--amber);
            text-shadow: 
                0 0 20px var(--amber),
                2px 0 var(--heat), 
                -2px 0 #00ff00;
            letter-spacing: 0.1em;
            margin-bottom: 0.5rem;
            animation: glitch 3s infinite;
            position: relative;
            text-align: center;
            line-height: 1;
        }

        @keyframes glitch {
            0%, 100% { text-shadow: 0 0 20px var(--amber), 2px 0 var(--heat), -2px 0 #00ff00; transform: translate(0); }
            92% { transform: translate(0); }
            93% { transform: translate(-2px, 2px); text-shadow: 2px 0 #ff0000, -2px 0 #00ffff; }
            94% { transform: translate(2px, -2px); }
            95% { transform: translate(0); text-shadow: 0 0 20px var(--amber), 2px 0 var(--heat), -2px 0 #00ff00; }
        }

        .subtitle {
            font-size: clamp(0.8rem, 3vw, 1.3rem);
            color: var(--copper);
            margin-bottom: 2rem;
            letter-spacing: 0.2em;
            text-align: center;
            max-width: 100%;
        }

        .menu-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1rem;
            width: 100%;
            max-width: 600px;
        }

        .menu-item {
            border: 2px solid var(--amber-dim);
            padding: 1rem;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
            background: rgba(255, 176, 0, 0.03);
            min-height: 80px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .menu-item::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 0; height: 100%;
            background: var(--amber);
            transition: width 0.3s;
            z-index: -1;
        }

        .menu-item:hover::before, .menu-item.active::before {
            width: 100%;
        }

        .menu-item:hover, .menu-item.active {
            color: #000;
            border-color: var(--amber);
            transform: scale(1.02);
            box-shadow: 0 0 20px var(--amber);
        }

        .menu-label {
            font-family: 'Bebas Neue', sans-serif;
            font-size: clamp(1rem, 4vw, 1.6rem);
            letter-spacing: 0.1em;
            position: relative;
            z-index: 1;
        }

        .menu-desc {
            font-size: clamp(0.7rem, 2.5vw, 0.9rem);
            margin-top: 0.3rem;
            opacity: 0.7;
            position: relative;
            z-index: 1;
            line-height: 1.2;
        }

        .status-bar {
            position: absolute;
            bottom: 10px;
            left: 10px;
            right: 10px;
            display: flex;
            justify-content: space-between;
            font-size: clamp(0.7rem, 2.5vw, 1rem);
            color: var(--amber-dim);
            border-top: 1px solid var(--amber-dim);
            padding-top: 0.5rem;
            flex-wrap: wrap;
            gap: 0.5rem;
        }

        .pulse-text {
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        @media (max-width: 480px) {
            .bezel {
                border-width: 10px;
                top: 5px; left: 5px; right: 5px; bottom: 5px;
                border-radius: 15px;
            }
            .screen {
                top: 15px; left: 15px; right: 15px; bottom: 15px;
            }
            .menu-grid {
                grid-template-columns: 1fr;
                gap: 0.8rem;
            }
            .menu-item {
                min-height: 70px;
                padding: 0.8rem;
            }
            .boot-screen {
                padding: 0.5rem;
            }
        }

        @media (min-width: 769px) {
            .menu-grid {
                grid-template-columns: repeat(2, 280px);
                gap: 2rem;
            }
            .bezel {
                top: 20px; left: 20px; right: 20px; bottom: 20px;
                border-width: 25px;
                border-radius: 30px;
            }
            .screen {
                top: 45px; left: 45px; right: 45px; bottom: 45px;
            }
        }
    </style>
</head>
<body>
    <div class="scanlines"></div>
    <div class="bezel"></div>
    
    <div class="screen">
        <div class="boot-screen crt-flicker" id="bootScreen">
            <div id="bootText"></div>
            <span class="cursor" id="cursor"></span>
        </div>

        <div class="main-menu crt-flicker" id="mainMenu">
            <h1 class="glitch-title">TWO GEARS</h1>
            <p class="subtitle">КООПЕРАТИВНЫЙ СТИМПАНК ПЛАТФОРМЕР</p>
            
            <div class="menu-grid">
                <div class="menu-item active" onclick="location.href='creator.html'">
                    <div class="menu-label">СОЗДАТЕЛЬ</div>
                    <div class="menu-desc">Кто стоит за проектом</div>
                </div>
                <div class="menu-item" onclick="location.href='story.html'">
                    <div class="menu-label">ИСТОРИЯ</div>
                    <div class="menu-desc">Сюжет, который цепляет</div>
                </div>
                <div class="menu-item" onclick="location.href='world.html'">
                    <div class="menu-label">МИР ИГРЫ</div>
                    <div class="menu-desc">Что уже построено</div>
                </div>
                <div class="menu-item" onclick="location.href='join.html'" style="border-color:var(--heat);">
                    <div class="menu-label" style="color:var(--heat);">ВАКАНСИИ</div>
                    <div class="menu-desc">3 позиции • Доля от продаж</div>
                </div>
            </div>

            <div class="status-bar">
                <span>SYSTEM READY</span>
                <span class="pulse-text">● RECRUITING NOW</span>
                <span id="clock">--:--</span>
            </div>
        </div>
    </div>

    <script>
        const bootLines = [
            "AWARD MODULAR BIOS v4.51PG",
            "Авторское право (C) 1984-95, Award Software, Inc",
            "",
            "CPU: Intel 486DX2-66",
            "640K RAM SYSTEM ... OK",
            "",
            "HDD: CONNER CP-30174 ... OK",
            "CD-ROM: MITSUMI CRMC-FX ... OK",
            "",
            "ЗАГРУЗКА ОПЕРАЦИОННОЙ СИСТЕМЫ ...",
            "MS-DOS 6.22 ...",
            "",
            "ИНИЦИАЛИЗАЦИЯ КООПЕРАТИВНОГО ТЕРМИНАЛА ВЕРСИИ 2.0",
            "...........................",
            "ПРЕДУПРЕЖДЕНИЕ: ОБНАРУЖЕНА АНОМАЛИЯ",
            "ИСТОЧНИК СИГНАЛА: НЕИЗВЕСТНОЕ УСТРОЙСТВО",
            "СТАТУС: ДВА ЧЕЛОВЕКА ПОЙМАНЫ В ЛОВУШКУ",
            "",
            "НАЖМИТЕ ЛЮБУЮ КЛАВИШУ, ЧТОБЫ УСТАНОВИТЬ СОЕДИНЕНИЕ _"
        ];

        let lineIndex = 0;
        const bootText = document.getElementById('bootText');

        function addLine() {
            if (lineIndex < bootLines.length) {
                const line = document.createElement('div');
                line.className = 'boot-line';
                line.style.animationDelay = '0s';
                line.textContent = bootLines[lineIndex] || ' ';
                line.style.opacity = '1';
                bootText.appendChild(line);
                lineIndex++;
                setTimeout(addLine, Math.random() * 100 + 30);
            }
        }

        setTimeout(addLine, 500);

        function showMenu() {
            document.getElementById('bootScreen').style.display = 'none';
            document.getElementById('mainMenu').style.display = 'flex';
            updateClock();
            setInterval(updateClock, 1000);
        }

        function updateClock() {
            const now = new Date();
            document.getElementById('clock').textContent = 
                now.toLocaleTimeString('ru-RU', {hour: '2-digit', minute:'2-digit'});
        }

        document.addEventListener('keydown', () => {
            if (lineIndex >= bootLines.length) showMenu();
        });
        document.addEventListener('click', () => {
            if (lineIndex >= bootLines.length) showMenu();
        });
        document.addEventListener('touchstart', () => {
            if (lineIndex >= bootLines.length) showMenu();
        });

        let items = document.querySelectorAll('.menu-item');
        let active = 0;
        
        document.addEventListener('keydown', (e) => {
            if (document.getElementById('mainMenu').style.display !== 'flex') return;
            
            items[active].classList.remove('active');
            if (e.key === 'ArrowDown') active = (active + 1) % 4;
            if (e.key === 'ArrowUp') active = (active - 1 + 4) % 4;
            if (e.key === 'ArrowRight') active = (active + 2) % 4;
            if (e.key === 'ArrowLeft') active = (active - 2 + 4) % 4;
            items[active].classList.add('active');
            
            if (e.key === 'Enter') {
                const href = items[active].getAttribute('onclick');
                eval(href);
            }
        });

        items.forEach((item, i) => {
            item.addEventListener('mouseenter', () => {
                items[active].classList.remove('active');
                active = i;
                item.classList.add('active');
            });
            item.addEventListener('touchstart', (e) => {
                e.preventDefault();
                items[active].classList.remove('active');
                active = i;
                item.classList.add('active');
                setTimeout(() => {
                    const href = item.getAttribute('onclick');
                    eval(href);
                }, 150);
            });
        });
    </script>
</body>
</html>
